<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>200 EMA Dashboard Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');
  :root {
    --bg:#080c14;--surface:#0d1420;--border:#1a2540;--dark:#0a0a0a;
    --label-bg:#1a1a2e;--trade-bg:#1a3a4a;--swing-bg:#0d1f4e;
    --green:#00C853;--red:#CC0000;--amber:#FF9100;--gold:#FFD600;
    --blue:#00BFFF;--purple:#CC00FF;--white:#ffffff;--dim:rgba(255,255,255,0.35);
    --near-g:#004d1a;--near-r:#5a0000;--buy-bg:#006400;--watch-bg:#B8600A;
    --rev-bg:#3d0000;--mtf-bg:#1a0050;--aplus-bg:#3d3000;--a-bg:#003d00;--b-bg:#003d3d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--white);font-family:'JetBrains Mono',monospace;min-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
  .logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}.logo span{color:var(--green)}
  .topinfo{display:flex;align-items:center;gap:16px;font-size:.68rem;color:var(--dim);flex-wrap:wrap}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);display:inline-block;margin-right:4px}
  .dot.live{background:var(--green);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .nxt{color:var(--blue);font-weight:700}
  .loading-bar{height:2px;background:linear-gradient(90deg,var(--blue),var(--purple));animation:scan 1.5s linear infinite;display:none}.loading-bar.active{display:block}
  @keyframes scan{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
  .prog{font-size:.68rem;color:var(--dim);padding:5px 20px;min-height:20px}
  .filters{display:flex;gap:6px;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
  .fbtn{padding:4px 10px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em}
  .fbtn:hover{border-color:var(--blue);color:var(--blue)}.fbtn.active{background:var(--blue);border-color:var(--blue);color:#000;font-weight:700}
  .wrap{padding:12px 20px;overflow-x:auto}
  /* COLUMN HEADERS */
  .col-hdr{display:grid;grid-template-columns:120px 6px repeat(6,1fr);margin-bottom:3px;font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border-radius:3px;overflow:hidden}
  .col-hdr>div{padding:5px 6px;text-align:center}
  .hdr-lbl{background:var(--label-bg);color:var(--dim);text-align:left!important}
  .hdr-gap{background:var(--label-bg)}
  .hdr-trade{background:var(--trade-bg);color:var(--white)}
  .hdr-swing{background:var(--swing-bg);color:var(--white)}
  /* CARDS */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .card{border:1px solid rgba(255,255,255,0.25);border-radius:4px;overflow:hidden}
  /* ROWS */
  .crow{display:grid;grid-template-columns:120px 6px repeat(6,1fr);border-top:1px solid rgba(26,37,64,.5)}
  .crow:first-child{border-top:none}
  .crow:hover .cell{background:rgba(255,255,255,.02)}
  .crow:hover .rlbl{background:#22223a}
  .rlbl{background:var(--label-bg);padding:4px 8px;font-size:.58rem;color:var(--white);display:flex;align-items:center;text-transform:uppercase;letter-spacing:.04em;cursor:default}
  .rgap{background:var(--label-bg)}
  .cell{padding:4px 4px;text-align:center;font-size:.67rem;display:flex;align-items:center;justify-content:center;background:var(--dark)}
  .blank .rlbl,.blank .rgap,.blank .cell{height:5px;padding:0;background:var(--label-bg)}
  /* TICKER ROW */
  .tick-row{display:grid;grid-template-columns:120px 6px repeat(6,1fr)}
  .tick-name{background:var(--label-bg);padding:6px 10px;font-weight:700;font-size:.78rem;cursor:pointer}
  .tick-name:hover{background:#252540}
  .tick-name.bull{color:var(--green)}.tick-name.bear{color:var(--red)}
  .tick-gap{background:var(--label-bg)}
  .tick-tf{padding:5px 4px;text-align:center;font-weight:700;font-size:.65rem;letter-spacing:.06em}
  .tick-tf.trade{background:var(--trade-bg)}.tick-tf.swing{background:var(--swing-bg)}
  /* PILLS */
  .pill{display:inline-block;padding:2px 5px;border-radius:3px;font-weight:700;font-size:.58rem}
  .buy{background:var(--buy-bg);color:var(--green)}.watch{background:var(--watch-bg);color:var(--amber)}
  .rbuy{background:var(--rev-bg);color:#ff4444}.rwatch{background:#2a1500;color:var(--amber)}
  .mtfp{background:var(--mtf-bg);color:var(--purple)}.aplus{background:var(--aplus-bg);color:var(--gold)}
  .agrade{background:var(--a-bg);color:var(--green)}.bgrade{background:var(--b-bg);color:var(--blue)}
  .g{color:var(--green)}.r{color:var(--red)}.a{color:var(--amber)}.go{color:var(--gold)}.b{color:var(--blue)}.p{color:var(--purple)}.d{color:var(--dim)}.w{color:var(--white)}
  /* FAILED */
  .fail-section{padding:10px 20px;font-size:.62rem;color:var(--dim)}
  .fail-section h3{color:#ff4444;margin-bottom:5px;font-size:.65rem}
  .fail-list{display:flex;flex-wrap:wrap;gap:5px}
  .fail-tag{background:#1a0000;border:1px solid #660000;color:#ff6666;padding:2px 7px;border-radius:3px;font-size:.6rem}
  footer{padding:10px 20px;font-size:.58rem;color:var(--dim);border-top:1px solid var(--border);margin-top:10px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">200 EMA <span>DASHBOARD</span> SCANNER</div>
  <div class="topinfo">
    <span><span class="dot" id="dot"></span><span id="stat">Initialising...</span></span>
    <span id="lupd"></span>
    <span>Next refresh: <span class="nxt" id="nxt">5:00</span></span>
    <span id="cnt"></span>
  </div>
</div>
<div class="loading-bar" id="lb"></div>
<div class="prog" id="prog"></div>

<div class="filters">
  <button class="fbtn active" onclick="setF(this,'ALL')">ALL</button>
  <button class="fbtn" onclick="setF(this,'BULL')">🟢 BULL</button>
  <button class="fbtn" onclick="setF(this,'BEAR')">🔴 BEAR</button>
  <button class="fbtn" onclick="setF(this,'CONT_BUY')">CONT BUY</button>
  <button class="fbtn" onclick="setF(this,'CONT_WATCH')">CONT WATCH</button>
  <button class="fbtn" onclick="setF(this,'REV_BUY')">REV BUY</button>
  <button class="fbtn" onclick="setF(this,'REV_WATCH')">REV WATCH</button>
  <button class="fbtn" onclick="setF(this,'MTF')">🎯 MTF LONG</button>
  <button class="fbtn" onclick="setF(this,'NEAR')">NEAR 200</button>
  <button class="fbtn" onclick="setF(this,'FVG')">IN FVG</button>
  <button class="fbtn" onclick="setF(this,'RSI_OS')">RSI OVERSOLD</button>
  <button class="fbtn" onclick="setF(this,'HIGH_VOL')">HIGH VOL</button>
  <button class="fbtn" onclick="setF(this,'LOW_VOL')">LOW VOL</button>
  <button class="fbtn" onclick="setF(this,'APLUS')">A+ SETUP</button>
</div>

<div class="wrap">
  <!-- TRADE/SWING section headers -->
  <div style="display:grid;grid-template-columns:120px 6px 2fr 4fr;margin-bottom:2px;font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase">
    <div style="background:var(--label-bg)"></div>
    <div style="background:var(--label-bg)"></div>
    <div style="background:var(--trade-bg);padding:4px 6px;text-align:center;color:var(--white)">── TRADE ──</div>
    <div style="background:var(--swing-bg);padding:4px 6px;text-align:center;color:var(--white)">── SWING ──</div>
  </div>
  <div class="col-hdr">
    <div class="hdr-lbl">TICKER</div>
    <div class="hdr-gap"></div>
    <div class="hdr-trade">15m</div>
    <div class="hdr-trade">30m</div>
    <div class="hdr-swing">1H</div>
    <div class="hdr-swing">4H</div>
    <div class="hdr-swing">1D</div>
    <div class="hdr-swing">1W</div>
  </div>
  <div class="grid" id="grid">
    <div style="padding:40px;text-align:center;color:var(--dim)">Starting scan...</div>
  </div>
</div>

<div class="fail-section" id="fs" style="display:none">
  <h3>⚠️ Failed to load:</h3>
  <div class="fail-list" id="fl"></div>
</div>

<footer>Data: Yahoo Finance via Netlify backend · Auto-refreshes every 5 min · Click ticker → TradingView · Not financial advice</footer>

<script>
const TICKERS = [
  'RXT','FLNC','FTNT','FIG','APP','SGML','UUUU','PATH','TOST','ADSK',
  'RBLX','SHOP','POET','OSCR','TSLA','ADBE','AXTI','GRAB','NVDA',
  'FCX','ZETA','ORCL','SNAP','SOUN','SMCI','PYPL','NKE','NIO','NFLX',
  'CSCO','BABA','PACS','IREN','OPEN','NUVB','GOOG','MU','INTC',
  'ASML','HPQ','ENPH','AVGO','RIVN','ONON','DELL','MP','AMD',
  'SPHR','QBTS','BBAI','SERV','BE','EOSE','RKLB','ASTS','UBER','MSTR',
  'ONDS','FLY','CART','RGTI','CVE','WULF','IONQ','LBRT',
  'TEM','LUNR','COHR','CRCL','PL','OUST','HUT','LUMN','CORZ',
  'KULR','BYND','NTLA'
];

const CFG = {
  VOL_HIGH:1.5, VOL_LOW:0.8, RSI_OS:35, RSI_OB:70,
  REFRESH:300,
  // Per-TF thresholds [buy%, watch%]
  THRESHOLDS:{
    tf15m:[2,3], tf30m:[2,3], tf1h:[2,3],
    tf4h:[2,4],  tf1d:[3,5],  tf1w:[5,10]
  },
  REV_WATCH:15
};

let results={}, failed=[], curFilter='ALL', scanning=false;
let nextAt = Date.now() + CFG.REFRESH*1000;

// Countdown
setInterval(()=>{
  const s=Math.max(0,Math.round((nextAt-Date.now())/1000));
  const m=Math.floor(s/60), sc=s%60;
  document.getElementById('nxt').textContent=`${m}:${sc<10?'0':''}${sc}`;
},1000);

// Fetch
async function fetchY(ticker,interval,range){
  try{
    const r=await fetch(`/.netlify/functions/yahoo?ticker=${ticker}&interval=${interval}&range=${range}`,{signal:AbortSignal.timeout(15000)});
    return r.ok?await r.json():null;
  }catch{return null}
}

function bars(d){
  try{
    const q=d.chart.result[0].indicators.quote[0];
    return q.close.map((c,i)=>({h:q.high[i],l:q.low[i],c,v:q.volume[i]})).filter(x=>x.c!=null&&x.h!=null);
  }catch{return[]}
}

// Indicators
function EMA(bs,p,s='c'){
  if(!bs||bs.length<p)return null;
  const k=2/(p+1);let e=bs.slice(0,p).reduce((a,b)=>a+b[s],0)/p;
  for(let i=p;i<bs.length;i++)e=bs[i][s]*k+e*(1-k);return e;
}
function RSI(bs,p=14){
  if(!bs||bs.length<p+1)return null;
  let g=0,l=0;
  for(let i=1;i<=p;i++){const d=bs[i].c-bs[i-1].c;d>0?g+=d:l-=d}
  let ag=g/p,al=l/p;
  for(let i=p+1;i<bs.length;i++){const d=bs[i].c-bs[i-1].c;ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p}
  return al===0?100:100-(100/(1+ag/al));
}
function RVOL(bs,p=20){
  if(!bs||bs.length<p+1)return null;
  const avg=bs.slice(-p-1,-1).reduce((a,b)=>a+(b.v||0),0)/p;
  return avg>0?(bs[bs.length-1].v||0)/avg:null;
}
function FVG(bs,min=0.1){
  if(!bs||bs.length<3)return{txt:'–',type:'none'};
  const price=bs[bs.length-1].c;
  for(let i=bs.length-1;i>=2&&i>=bs.length-15;i--){
    const bg=bs[i].l-bs[i-2].h;
    if(bg>0&&bg/price*100>=min){
      if(price>=bs[i-2].h&&price<=bs[i].l)return{txt:'IN BULL FVG',type:'in_bull'};
      const pr=Math.min(Math.abs(price-bs[i].l),Math.abs(price-bs[i-2].h))/price*100;
      if(pr<=3)return{txt:`${pr.toFixed(1)}% BULL FVG`,type:'near_bull'};
    }
    const bg2=bs[i-2].l-bs[i].h;
    if(bg2>0&&bg2/price*100>=min&&price<=bs[i-2].l&&price>=bs[i].h)return{txt:'IN BEAR FVG',type:'in_bear'};
  }
  return{txt:'–',type:'none'};
}
function SR(bs,lb=20){
  if(!bs||bs.length<lb)return null;
  const price=bs[bs.length-1].c,sl=bs.slice(-lb);
  const swH=Math.max(...sl.map(b=>b.h)),swL=Math.min(...sl.map(b=>b.l));
  const pH=Math.abs(price-swH)/price*100,pL=Math.abs(price-swL)/price*100;
  return pH<pL?{txt:`RES $${swH.toFixed(2)}`,bullish:false,near:pH<=2}:{txt:`SUP $${swL.toFixed(2)}`,bullish:true,near:pL<=2};
}
function VWAP(bs){
  if(!bs||bs.length<5)return null;
  const sl=bs.slice(-20);
  const sumpv=sl.reduce((a,b)=>a+((b.h+b.l+b.c)/3)*(b.v||0),0);
  const sumv=sl.reduce((a,b)=>a+(b.v||0),0);
  return sumv>0?sumpv/sumv:null;
}

function computeTF(bs,dailyBull,price,tfKey="tf1d"){
  if(!bs||bs.length<30)return null;
  const e200=EMA(bs,Math.min(200,bs.length-1));
  const e5l=EMA(bs,5,'l');
  const e100h=EMA(bs,Math.min(100,bs.length-1),'h');
  const e100l=EMA(bs,Math.min(100,bs.length-1),'l');
  const rv=RVOL(bs),rsiV=RSI(bs),fvgR=FVG(bs),srR=SR(bs);
  const vwap=VWAP(bs);
  const ab200=e200?price>e200:null;
  const pct200=e200?Math.abs(price-e200)/e200*100:null;
  const ab5l=e5l?price>e5l:null;
  const inBand=(e100h&&e100l)?price<=e100h&&price>=e100l:false;
  const vwapPct=vwap?(price-vwap)/vwap*100:null;
  const [buyT,watchT]=CFG.THRESHOLDS[tfKey]||[5,10];
  let action='–';
  if(dailyBull&&ab200){
    if(pct200<=buyT)action='CONT_BUY';
    else if(pct200<=watchT)action='CONT_WATCH';
  }else if(!dailyBull){
    if(ab200)action='REV_BUY';
    else if(pct200!=null&&pct200<=CFG.REV_WATCH)action='REV_WATCH';
  }
  return{ab200,pct200,ab5l,inBand,rv,rsiV,fvgR,srR,vwapPct,action};
}

// Symbol fixes for Yahoo Finance
const SYMBOL_MAP = {
  'GOOG':'GOOGL','BABA':'BABA','NIO':'NIO','ASML':'ASML',
  'GRAB':'GRAB','RZLV':'RKLVY','HNGE':'HNGE','NBIS':'NBIS',
  'PONY':'PONY','CRWV':'CRWV','BTDR':'BTDR'
};
async function scan(ticker){
  const sym = SYMBOL_MAP[ticker] || ticker;
  try{
    const[d15,d30,d1h,d1d,d1w]=await Promise.all([
      fetchY(sym,'15m','60d'),fetchY(sym,'30m','60d'),
      fetchY(sym,'60m','3mo'),fetchY(sym,'1d','2y'),fetchY(sym,'1wk','5y')
    ]);
    const b1d=bars(d1d);
    if(b1d.length<60)return null;
    const price=b1d[b1d.length-1].c;
    const e200_1d=EMA(b1d,200);
    const dailyBull=e200_1d?price>e200_1d:false;

    const tfs={
      tf15m:computeTF(bars(d15),dailyBull,price,'tf15m'),
      tf30m:computeTF(bars(d30),dailyBull,price,'tf30m'),
      tf1h:computeTF(bars(d1h),dailyBull,price,'tf1h'),
      tf4h:null,tf1d:null,tf1w:null
    };

    // 4H proxy
    const e200_4h=EMA(b1d.slice(-100),50);
    const ab4h=e200_4h?price>e200_4h:null;
    const pct4h=e200_4h?Math.abs(price-e200_4h)/e200_4h*100:null;
    let act4h='–';
    const[buy4h,watch4h]=CFG.THRESHOLDS['tf4h'];if(dailyBull&&ab4h){if(pct4h<=buy4h)act4h='CONT_BUY';else if(pct4h<=watch4h)act4h='CONT_WATCH';}
    else if(!dailyBull){if(ab4h)act4h='REV_BUY';else if(pct4h!=null&&pct4h<=CFG.REV_WATCH)act4h='REV_WATCH';}
    tfs.tf4h={ab200:ab4h,pct200:pct4h,ab5l:null,inBand:false,rv:RVOL(b1d),rsiV:RSI(b1d.slice(-50)),fvgR:FVG(b1d),srR:SR(b1d),vwapPct:null,action:act4h};

    tfs.tf1d=computeTF(b1d,dailyBull,price,'tf1d');
    tfs.tf1w=computeTF(bars(d1w),dailyBull,price,'tf1w');

    const mtfLong=dailyBull&&ab4h===false;
    let conf=0;
    if(dailyBull)conf++;
    if(tfs.tf1d?.pct200<=5)conf++;
    if(tfs.tf1d?.ab5l)conf++;
    if(tfs.tf4h?.rsiV<=CFG.RSI_OS)conf++;
    if(tfs.tf1d?.fvgR?.type==='in_bull')conf++;
    if(tfs.tf1d?.srR?.bullish&&tfs.tf1d?.srR?.near)conf++;
    if(tfs.tf4h?.rv>=CFG.VOL_LOW&&tfs.tf4h?.rv<CFG.VOL_HIGH)conf++;
    const confR=conf>=6?'A+':conf>=4?'A':conf>=3?'B':conf>=2?'C':'–';

    const tags=['ALL'];
    if(dailyBull)tags.push('BULL');else tags.push('BEAR');
    const acts=Object.values(tfs).map(t=>t?.action||'–');
    if(acts.includes('CONT_BUY'))tags.push('CONT_BUY');
    if(acts.includes('CONT_WATCH'))tags.push('CONT_WATCH');
    if(acts.includes('REV_BUY'))tags.push('REV_BUY');
    if(acts.includes('REV_WATCH'))tags.push('REV_WATCH');
    if(mtfLong)tags.push('MTF');
    if(tfs.tf1d?.pct200<=5)tags.push('NEAR');
    if(Object.values(tfs).some(t=>t?.fvgR?.type==='in_bull'))tags.push('FVG');
    if([tfs.tf4h,tfs.tf1d].some(t=>t?.rsiV<=CFG.RSI_OS))tags.push('RSI_OS');
    if(Object.values(tfs).some(t=>t?.rv>=CFG.VOL_HIGH))tags.push('HIGH_VOL');
    if(Object.values(tfs).some(t=>t?.rv<=CFG.VOL_LOW))tags.push('LOW_VOL');
    if(confR==='A+')tags.push('APLUS');

    return{ticker,price,dailyBull,mtfLong,conf,confR,tfs,tags:tags.join(',')};
  }catch{return null}
}

// CELL RENDERERS
const sp=(cls,txt)=>`<span class="${cls}">${txt}</span>`;
const p=(cls,txt)=>`<span class="pill ${cls}">${txt}</span>`;
const nd=()=>sp('d','–');

function cArrow(v){return v==null?nd():v?sp('g','▲'):sp('r','▼')}
function cProx(pct,ab){
  if(pct==null||ab==null)return nd();
  const near=pct<=5;
  const style=near?(ab?`background:var(--near-g)`:`background:var(--near-r)`):'';
  return`<span class="${ab?'g':'r'}" style="${style};padding:1px 3px;border-radius:2px">${ab?'▲':'▼'} ${pct.toFixed(2)}%</span>`;
}
function cBand(inBand,ab){
  if(!inBand)return nd();
  const cls=ab?'g':'r',bg=ab?'var(--near-g)':'var(--near-r)';
  return`<span class="${cls}" style="background:${bg};padding:1px 3px;border-radius:2px">IN BAND</span>`;
}
function cVol(rv){
  if(rv==null)return nd();
  if(rv>=CFG.VOL_HIGH)return`<span style="color:var(--amber)">HIGH</span>`;
  if(rv<=CFG.VOL_LOW)return`<span style="color:#888">LOW</span>`;
  return sp('w','NORMAL');
}
function cAction(act){
  if(act==='CONT_BUY')return p('buy','BUY');
  if(act==='CONT_WATCH')return p('watch','WATCH');
  if(act==='REV_BUY')return p('rbuy','REV BUY');
  if(act==='REV_WATCH')return p('rwatch','REV WATCH');
  return nd();
}
function cRSI(v){
  if(!v)return nd();
  const cls=v>=CFG.RSI_OB?'r':v<=CFG.RSI_OS?'g':'w';
  const bg=v>=CFG.RSI_OB?'background:var(--near-r)':v<=CFG.RSI_OS?'background:var(--near-g)':'';
  return`<span class="${cls}" style="${bg};padding:1px 3px;border-radius:2px">${Math.round(v*10)/10}</span>`;
}
function cVWAP(pct){
  if(pct==null)return nd();
  const abs=Math.abs(pct).toFixed(2);
  if(Math.abs(pct)<=1)return sp('w',`${pct>=0?'▲':'▼'} ${abs}%`);
  return sp(pct>0?'g':'r',`${pct>0?'▲':'▼'} ${abs}%`);
}
function cFVG(f){
  if(!f||f.type==='none')return nd();
  if(f.type==='in_bull')return`<span class="g" style="background:var(--near-g);padding:1px 3px;border-radius:2px">IN BULL FVG</span>`;
  if(f.type==='in_bear')return`<span class="r" style="background:var(--near-r);padding:1px 3px;border-radius:2px">IN BEAR FVG</span>`;
  if(f.type==='near_bull')return sp('a',f.txt);
  return nd();
}
function cSR(s){
  if(!s)return nd();
  return sp(s.bullish?(s.near?'g':'d'):(s.near?'a':'d'),s.txt);
}
function cConf(r){
  if(r==='A+')return p('aplus','A+ ★★★');
  if(r==='A')return p('agrade','A ★★');
  if(r==='B')return p('bgrade','B ★');
  return sp('d',r==='–'?'–':r);
}

function buildCard(res){
  const{ticker,price,dailyBull,mtfLong,confR,tfs,tags}=res;
  const TL=['tf15m','tf30m','tf1h','tf4h','tf1d','tf1w'];
  const TC=['trade','trade','swing','swing','swing','swing'];
  const T=TL.map(k=>tfs[k]);
  const cells=(fn)=>T.map(t=>t?fn(t):nd());
  const row=(lbl,cls)=>`<div class="crow">
    <div class="rlbl">${lbl}</div><div class="rgap"></div>
    ${cls.map(c=>`<div class="cell">${c}</div>`).join('')}
  </div>`;
  const blank=()=>`<div class="crow blank">
    <div class="rlbl"></div><div class="rgap"></div>
    ${T.map(()=>'<div class="cell"></div>').join('')}
  </div>`;

  // Action row — only show relevant one
  const actLabel=dailyBull
    ?`<span style="color:var(--green);font-weight:700">CONTINUATION</span>`
    :`<span style="color:var(--red);font-weight:700">REVERSAL</span>`;

  return`<div class="card" data-tags="${tags}">
    <div class="tick-row">
      <div class="tick-name ${dailyBull?'bull':'bear'}" onclick="openTV('${ticker}')">
        ${ticker}<br><span style="font-size:.58rem;color:var(--dim);font-weight:400">$${price?.toFixed(2)||'–'}</span>
      </div>
      <div class="tick-gap"></div>
      ${TL.map((_,i)=>`<div class="tick-tf ${TC[i]}">${['15m','30m','1H','4H','1D','1W'][i]}</div>`).join('')}
    </div>
    ${row('200 EMA A/B',   cells(t=>cArrow(t.ab200)))}
    ${row('200 EMA PROX%', cells(t=>cProx(t.pct200,t.ab200)))}
    ${row('100 EMA H/L',   cells(t=>cBand(t.inBand,t.ab200)))}
    ${row('5 LOW EMA A/B', cells(t=>cArrow(t.ab5l)))}
    ${row('VOLUME',        cells(t=>cVol(t.rv)))}
    ${blank()}
    ${row(actLabel,        cells(t=>cAction(t.action)))}
    ${row(`<span style="color:var(--purple)">MTF LONG</span>`,
      T.map((_,i)=>i===2?(mtfLong?p('mtfp','🎯 LONG'):nd()):nd()))}
    ${blank()}
    ${row('RSI',      cells(t=>cRSI(t.rsiV)))}
    ${row('VWAP',     cells(t=>cVWAP(t.vwapPct)))}
    ${row('FVG',      cells(t=>cFVG(t.fvgR)))}
    ${row('S/R LEVEL',cells(t=>cSR(t.srR)))}
    ${blank()}
    ${row(`<span style="color:var(--gold)">CONFLUENCE</span>`,
      T.map((_,i)=>i===4?cConf(confR):nd()))}
  </div>`;
}

// FILTER
function setF(btn,f){
  curFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');applyFilter();
}
function applyFilter(){
  document.querySelectorAll('.card').forEach(c=>{
    const tags=c.getAttribute('data-tags')||'ALL';
    c.style.display=(curFilter==='ALL'||tags.includes(curFilter))?'':'none';
  });
}
function openTV(t){window.open(`https://www.tradingview.com/chart/?symbol=${t}`,'_blank')}

function renderAll(){
  const vals=Object.values(results).filter(Boolean);
  const grid=document.getElementById('grid');
  if(!vals.length){grid.innerHTML='<div style="padding:40px;text-align:center;color:var(--dim)">Scanning...</div>';return}
  vals.sort((a,b)=>{
    if(a.dailyBull!==b.dailyBull)return a.dailyBull?-1:1;
    return(a.tfs.tf1d?.pct200??999)-(b.tfs.tf1d?.pct200??999);
  });
  grid.innerHTML=vals.map(buildCard).join('');
  applyFilter();
  const bull=vals.filter(r=>r.dailyBull).length;
  document.getElementById('cnt').textContent=`${vals.length} loaded | 🟢 ${bull} | 🔴 ${vals.length-bull}`;
  if(failed.length){
    document.getElementById('fs').style.display='block';
    document.getElementById('fl').innerHTML=failed.map(t=>`<span class="fail-tag">${t}</span>`).join('');
  }
}

async function runScan(){
  if(scanning)return;
  scanning=true;failed=[];
  document.getElementById('lb').classList.add('active');
  document.getElementById('dot').classList.add('live');
  document.getElementById('stat').textContent='Scanning...';
  let done=0;
  for(let i=0;i<TICKERS.length;i+=3){
    const batch=TICKERS.slice(i,i+3);
    const res=await Promise.all(batch.map(scan));
    res.forEach((r,idx)=>{if(r)results[batch[idx]]=r;else failed.push(batch[idx]);done++});
    document.getElementById('prog').textContent=`Scanning ${done}/${TICKERS.length}... (${Object.keys(results).length} loaded)`;
    renderAll();
    await new Promise(r=>setTimeout(r,300));
  }
  scanning=false;
  nextAt=Date.now()+CFG.REFRESH*1000;
  document.getElementById('lb').classList.remove('active');
  document.getElementById('stat').textContent='Live';
  document.getElementById('lupd').textContent='Updated '+new Date().toLocaleTimeString();
  document.getElementById('prog').textContent='';
}

runScan();
setInterval(runScan,CFG.REFRESH*1000);
</script>
